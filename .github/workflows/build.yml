name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create local.properties with secrets
        run: |
          echo "SHEETS_API_KEY=${{ secrets.SHEETS_API_KEY }}" >> local.properties
          echo "SHEET_ID=${{ secrets.SHEET_ID }}" >> local.properties

      - name: Make gradlew executable & add wrapper jar
        run: |
          chmod +x gradlew
          mkdir -p gradle/wrapper
          curl -o gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: TradingViewAlert-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
